name: guvenli_sehrim
description: "Güvenli Şehrim - Modern Şehir Bilgi Uygulaması"
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Network
  dio: ^5.4.3

  # Database / Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Maps & Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Notifications
  flutter_local_notifications: ^17.1.2

  # Charts
  fl_chart: ^0.67.0

  # UI & Utilities
  intl: ^0.19.0
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0
  logger: ^2.3.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1

  # Models (Production-grade)
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  
  # Generators
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  
  # Assets
  # assets:
  #   - assets/images/
  #   - assets/icons/
